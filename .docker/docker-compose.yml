services:
  lms-app:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    container_name: lms-app
    env_file:
      - .env
    depends_on:
      lms-db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && npm run build && npm run start:dev"
    restart: always
    networks:
      - lms-network

  lms-db:
    image: mysql:8.0
    container_name: lms-db
    env_file:
      - .env
    ports:
      - '3306:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      retries: 5
    volumes:
      - lms_db_data:/var/lib/mysql
    networks:
      - lms-network

networks:
  lms-network:
    external: true

volumes:
  lms_db_data:
